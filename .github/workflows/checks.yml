name: checks

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Layout check
        run: npm run check:layout

      - name: Python syntax check
        run: |
          npm run check:python
          find . -name '*.py' -print0 | xargs -0 python -m py_compile

      - name: Node syntax check
        run: npm run check:node

      - name: Shell syntax check
        run: bash -n scripts/check_layout.sh scripts/workspace_env.sh

      - name: JSON parse check
        run: |
          node - <<'NODE'
          const fs = require("fs");
          const files = [
            "vault-manifest.json",
            ".codex/hooks.json.example",
            "adapters/codex/adapter.json",
            "adapters/codex/.codex/hooks.json",
            "adapters/claude-code/adapter.json",
            "adapters/gemini-cli/adapter.json",
            "adapters/cursor/adapter.json",
          ];
          for (const file of files) {
            JSON.parse(fs.readFileSync(file, "utf8"));
            console.log("ok", file);
          }
          NODE

      - name: Init dry run
        run: node scripts/init-kit.mjs --vault /tmp/ckw-vault --tool all --dry-run

      - name: Init layout smoke test
        run: |
          tmpdir="$(mktemp -d)"
          node scripts/init-kit.mjs --vault "$tmpdir" --tool all
          CKW_VAULT_ROOT="$tmpdir" bash scripts/check_layout.sh
          rm -rf "$tmpdir"

      - name: Public safety scan
        run: |
          ! grep -R -n -E '/Users/kagami|FLOMO_SECRET = "[^"]|dbbc3dd|192\.168|sk-[A-Za-z0-9]' \
            --exclude-dir=.github \
            --exclude-dir=.git \
            --exclude-dir=node_modules \
            .
          ! find . -type f \( \
            -name '*.pdf' -o -name '*.png' -o -name '*.jpg' -o -name '*.jpeg' -o \
            -name '*.webp' -o -name '*.mp4' -o -name '*.mov' -o -name '*.sqlite' -o \
            -name '*.db' -o -name '*.env' -o -name '.env*' \
          \) -print | grep .
